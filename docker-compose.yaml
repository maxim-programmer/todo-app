services:
  web-server:
    image: caddy:2.11.1-alpine
    container_name: web-server
    environment:
      - CADDY_HOST=${CADDY_HOST:-localhost}
    volumes:
      - ${PROJECT_ROOT}/web/Caddyfile:/etc/caddy/Caddyfile
      - ${PROJECT_ROOT}/out/caddy_data:/data
      - ${PROJECT_ROOT}/web/public:/web/public
    ports:
      - "80:80"
      - "443:443"
    restart: always

  todoapp:
    build:
      context: ${PROJECT_ROOT}
      dockerfile: ${PROJECT_ROOT}/cmd/todoapp/Dockerfile
    container_name: todoapp
    env_file:
      - ${PROJECT_ROOT}/.env
    environment:
      - HTTP_ADDR=:5050
      - POSTGRES_HOST=todoapp-postgres
      - REDIS_HOST=todoapp-redis
      - LOGGER_FOLDER=/app/out/logs
    volumes:
      - ${PROJECT_ROOT}/out/logs:/app/out/logs
    restart: always

  todoapp-postgres:
    image: postgres:18.1-bookworm
    container_name: todoapp-env-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always

  todoapp-redis:
    image: redis:8.6.1
    container_name: todoapp-env-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ${PROJECT_ROOT}/out/redis_data:/data
    restart: always

  todoapp-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: todoapp-env-port-forwarder
    entrypoint: |
      /bin/sh -c "
        socat -d -d tcp-listen:5432,fork,reuseaddr tcp-connect:todoapp-postgres:5432 &
        socat -d -d tcp-listen:6379,fork,reuseaddr tcp-connect:todoapp-redis:6379 &
        wait
      "
    ports:
      - "127.0.0.1:5432:5432"
      - "127.0.0.1:6379:6379"

  swagger:
    build:
      context: ${PROJECT_ROOT}
      dockerfile_inline: |
        FROM golang:1.24.1-alpine
        RUN apk add --no-cache git
        RUN go install github.com/swaggo/swag/cmd/swag@v1.16.6
        WORKDIR /code
        ENTRYPOINT ["swag"]
    volumes:
      - ${PROJECT_ROOT}:/code
